name: docs

# Build the MkDocs portal (narrative + Python API) and publish it to GitHub
# Pages. The Python API reference (mkdocstrings) imports the compiled module,
# so we build turboswarm first via `pip install .` (maturin build backend).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # PyO3 0.22 supports up to 3.13

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install the package and docs tooling
        run: |
          python -m pip install --upgrade pip
          # Builds the Rust core + bindings (numpy, matplotlib come as deps).
          pip install .
          pip install mkdocs-material "mkdocstrings[python]" black

      - name: Build the site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
