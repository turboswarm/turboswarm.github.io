name: release-crates

# Publishes the Rust crate `pso-core` to crates.io when a version tag is pushed.
# Requires a repository secret CARGO_REGISTRY_TOKEN (from crates.io account
# settings). Trigger with:  git tag v0.1.0 && git push --tags

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish pso-core
        run: cargo publish -p pso-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
